name: Docker build and push Production

on:
  push:
    branches:
      - main
    paths:
      - "version.txt"

env: 
  AWS_REGION: ca-central-1
  REGISTRY: ${{ vars.PROD_AWS_ACCOUNT_ID }}.dkr.ecr.ca-central-1.amazonaws.com/superset

permissions:
  id-token: write
  contents: write
  
jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Get version to deploy
        id: get-version
        uses: ./.github/workflows/get-version
        with:
          is-tagged: "true"

  docker-push:
    runs-on: ubuntu-24.04-arm
    needs: get-version
    env:
      VERSION: ${{ needs.get-version.outputs.version }}
    steps:
    - name: Audit DNS requests
      uses: cds-snc/dns-proxy-action@c187d352e5065709dcfccb84c586a71bce45cc75
      env:
        DNS_PROXY_FORWARDTOSENTINEL: "true"
        DNS_PROXY_LOGANALYTICSWORKSPACEID: ${{ secrets.LOG_ANALYTICS_WORKSPACE_ID }}
        DNS_PROXY_LOGANALYTICSSHAREDKEY: ${{ secrets.LOG_ANALYTICS_WORKSPACE_KEY }}

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ env.VERSION }}
        persist-credentials: false

    # TODO: Replace with a locked down IAM role
    - name: configure aws credentials using OIDC
      uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
      with:
        role-to-assume: arn:aws:iam::${{ vars.PROD_AWS_ACCOUNT_ID }}:role/cds-superset-apply 
        role-session-name: PushContainer
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@183a1442edf41672e66566b7fc560e297a290896 # v2.1.1 
  
    - name: Build container
      working-directory: ./
      run: |
        docker build \
        --file ./docker/Dockerfile \
        --tag $REGISTRY:${VERSION} \
        --tag $REGISTRY:latest ./docker \
        --platform linux/arm64

    - name: Push Container to Amazon ECR
      run: |
        docker push $REGISTRY:${VERSION}
        docker push $REGISTRY:latest
