name: Workflow failure

on:
  workflow_call:
    secrets:
      LOG_ANALYTICS_WORKSPACE_ID:
        required: true
      LOG_ANALYTICS_WORKSPACE_KEY:
        required: true
      STAGING_CLOUDWATCH_ALERT_SLACK_WEBHOOK:
        required: true
      PROD_CLOUDWATCH_ALERT_SLACK_WEBHOOK:
        required: true

permissions:
  contents: none

jobs:
  on-failure:
    runs-on: ubuntu-latest
    env:
      WORKFLOW_NAME: '${{ github.workflow }}'
    steps:
      - name: Audit DNS requests
        uses: cds-snc/dns-proxy-action@9ad793100229573be3f5ba78cc69ec523f2c8b7e # v1.1.0
        env:
          DNS_PROXY_FORWARDTOSENTINEL: "true"
          DNS_PROXY_LOGANALYTICSWORKSPACEID: "${{ secrets.LOG_ANALYTICS_WORKSPACE_ID }}"
          DNS_PROXY_LOGANALYTICSSHAREDKEY: "${{ secrets.LOG_ANALYTICS_WORKSPACE_KEY }}"
          DNS_PROXY_SAFELIST: "${{ vars.DNS_PROXY_SAFELIST }}"
          DNS_PROXY_WILDCARDGREEDY: "true"

      - name: Determine target ops channel
        id: webhook
        run: |
          WORKFLOW_NAME_LOWER="$(echo ${WORKFLOW_NAME} | tr '[:upper:]' '[:lower:]')"
          if [[ "$WORKFLOW_NAME_LOWER" == *"staging"* ]]; then
            echo "SLACK_WEBHOOK_URL=${{ secrets.STAGING_CLOUDWATCH_ALERT_SLACK_WEBHOOK }}" >> $GITHUB_OUTPUT
          else
            echo "SLACK_WEBHOOK_URL=${{ secrets.PROD_CLOUDWATCH_ALERT_SLACK_WEBHOOK }}" >> $GITHUB_OUTPUT
          fi

      - name: Notify Slack
        run: |
          json='{"blocks":[{"type":"section","text":{"type":"mrkdwn","text":":red: Superset workflow failed: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ github.workflow }}>"}}]}'
          curl -X POST -H 'Content-type: application/json' --data "$json" ${{ steps.webhook.outputs.SLACK_WEBHOOK_URL }}
